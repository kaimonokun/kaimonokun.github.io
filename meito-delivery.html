<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>納品書生成 - 買い物くん</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="staff-body">

    <div id="staffHeaderMount" class="no-print"></div>

    <main class="staff-main staff-doc">
        <div class="staff-doc-titlebar no-print">
            <h2 class="staff-doc-title">🧾 納品書生成</h2>
            <div class="staff-doc-meta" id="docMeta"></div>
            <div class="staff-doc-actions">
                <button class="staff-action-btn" id="printAllBtn">
                    🖨 すべてまとめて印刷
                </button>
            </div>
        </div>

        <div class="staff-doc-empty no-print" id="emptyView" hidden>
            <div class="staff-doc-empty-icon">📋</div>
            <div>本日まだ注文が入っていません</div>
        </div>

        <div class="delivery-list" id="deliveryList"></div>
    </main>

    <script src="data.js"></script>
    <script src="auth.js"></script>
    <script src="meito-common.js"></script>
    <script>
        if (!requireAuth("meito")) { /* リダイレクト中 */ }
        else {
            document.addEventListener("DOMContentLoaded", async () => {
                try { await dataReady; } catch { return; }
                document.getElementById("staffHeaderMount").innerHTML =
                    meitoRenderHeader("納品書生成");
                document.getElementById("docMeta").innerHTML =
                    `<span>📅 ${meitoFormatToday()}</span>` +
                    `<span class="staff-doc-meta-sep">・</span>` +
                    `<span>📍 ${getRegionName(getCurrentRegion())}</span>`;
                renderDelivery();
                document.getElementById("printAllBtn").addEventListener("click", () => window.print());
            });
        }

        function renderDelivery() {
            const orders = meitoLoadOrders();
            const container = document.getElementById("deliveryList");
            const emptyView = document.getElementById("emptyView");

            if (orders.length === 0) {
                emptyView.hidden = false;
                container.innerHTML = "";
                return;
            }
            emptyView.hidden = true;

            const region = getRegionName(getCurrentRegion());

            container.innerHTML = orders.map(order => {
                const orderTotal = meitoGetOrderTotal(order);
                const estTotal   = order.items.reduce((s, it) => s + it.price * it.qty, 0);
                const anyAdj     = order.items.some(meitoIsAdjusted);
                const hasBW      = order.items.some(it => it.byWeight);

                return `
                    <article class="delivery-slip">
                        <div class="delivery-slip-head">
                            <div class="delivery-slip-title">納 品 書</div>
                            <div class="delivery-slip-meta">
                                <div>地区：${region}</div>
                                <div>発行日：${meitoFormatDate(order)}</div>
                            </div>
                        </div>

                        <div class="delivery-slip-number">
                            <div class="delivery-slip-number-label">お客様番号</div>
                            <div class="delivery-slip-number-value">${order.number}番</div>
                        </div>

                        <table class="delivery-table">
                            <thead>
                                <tr>
                                    <th class="dt-emoji"></th>
                                    <th class="dt-name">品物</th>
                                    <th class="dt-qty">数量</th>
                                    <th class="dt-unit">単価</th>
                                    <th class="dt-amount">金額</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${order.items.map(item => {
                                    const est = item.price * item.qty;
                                    const act = meitoGetItemTotal(item);
                                    const adj = meitoIsAdjusted(item);
                                    return `
                                        <tr>
                                            <td class="dt-emoji">${item.emoji}</td>
                                            <td class="dt-name">
                                                ${meitoEscapeHtml(item.name)}
                                                ${item.byWeight ? '<span class="dt-bw">（量り売り）</span>' : ''}
                                            </td>
                                            <td class="dt-qty">${item.qty}</td>
                                            <td class="dt-unit">${item.byWeight ? "約 " : ""}${item.price.toLocaleString()}</td>
                                            <td class="dt-amount">
                                                ${adj
                                                    ? `<span class="dt-amount-est">${est.toLocaleString()}</span>
                                                       <span class="dt-amount-act">${act.toLocaleString()}円</span>`
                                                    : `${item.byWeight ? "約 " : ""}${est.toLocaleString()}円`
                                                }
                                            </td>
                                        </tr>
                                    `;
                                }).join("")}
                            </tbody>
                            <tfoot>
                                ${anyAdj ? `
                                    <tr class="dt-row-est">
                                        <td colspan="4">調整前 合計</td>
                                        <td>${estTotal.toLocaleString()}円</td>
                                    </tr>
                                ` : ""}
                                <tr class="dt-row-total">
                                    <td colspan="4">合計（お支払い）</td>
                                    <td>${hasBW && !anyAdj ? "約 " : ""}${orderTotal.toLocaleString()}円</td>
                                </tr>
                            </tfoot>
                        </table>

                        ${hasBW && !anyAdj ? `
                            <div class="delivery-slip-note">
                                ※「約」が付いた品物は、実際の重さで多少お値段が変わることがあります。
                            </div>
                        ` : ""}

                        <div class="delivery-slip-foot">
                            <div class="delivery-slip-stamp">買い物くん</div>
                            <div class="delivery-slip-line">いつもご利用ありがとうございます。</div>
                        </div>

                        <div class="delivery-slip-actions no-print">
                            <button class="staff-action-btn delivery-print-one"
                                    data-order="${order.number}">
                                🖨 この1枚だけ印刷
                            </button>
                        </div>
                    </article>
                `;
            }).join("");

            // 1件だけ印刷：他を非表示にしてから window.print()
            container.querySelectorAll(".delivery-print-one").forEach(btn => {
                btn.addEventListener("click", () => {
                    const target = btn.dataset.order;
                    const slips = container.querySelectorAll(".delivery-slip");
                    slips.forEach(s => {
                        const ownBtn = s.querySelector(".delivery-print-one");
                        if (ownBtn && ownBtn.dataset.order === target) {
                            s.classList.remove("delivery-slip-hide-print");
                        } else {
                            s.classList.add("delivery-slip-hide-print");
                        }
                    });
                    window.print();
                    setTimeout(() => {
                        slips.forEach(s => s.classList.remove("delivery-slip-hide-print"));
                    }, 500);
                });
            });
        }
    </script>
</body>
</html>
